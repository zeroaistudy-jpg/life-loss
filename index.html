<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>虚無ラボ (void_lab)</title>
    <meta name="description" content="非生産的だが美しい空間、深淵を覗くためのポータルサイト。">
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="portal-container">
        <!-- Floating particles background -->
        <div class="particles" id="particles"></div>

        <header class="portal-header">
            <div class="logo-area">
                <h1>void_lab</h1>
                <p class="subtitle">虚 無 ラ ボ</p>
            </div>
            <p class="intro-desc">ここは、生産性にとらわれない時間を観測する深淵の研究所。</p>
        </header>

        <main class="portal-main">
            <section class="tools-grid">
                <!-- Tool Card 1 -->
                <a href="./receipt/index.html" class="tool-card">
                    <div class="card-glass">
                        <div class="card-icon">⏳</div>
                        <div class="card-content">
                            <h2 class="card-title">虚無の領収書</h2>
                            <p class="card-desc">あなたが日々の生活で「無駄にした時間」や「失った金額」を算出し、戒めの領収書を発行します。</p>
                            <span class="card-tag">人生観測</span>
                        </div>
                        <div class="card-action">診断する &rarr;</div>
                    </div>
                </a>

                <!-- Coming soon placeholder -->
                <div class="tool-card disabled">
                    <div class="card-glass">
                        <div class="card-icon">???</div>
                        <div class="card-content">
                            <h2 class="card-title">CLASSIFIED</h2>
                            <p class="card-desc">現在新たな虚無装置を開発中...</p>
                            <span class="card-tag">機密</span>
                        </div>
                    </div>
                </div>
            </section>
        </main>

        <footer class="portal-footer">
            <p>&copy; 2026 虚無ラボ(void_lab) / 砂時計の精</p>
        </footer>
    </div>

    <script>
        // Simple particle generator for the void aesthetic
        const particlesContainer = document.getElementById('particles');
        const particleCount = 30;

        for (let i = 0; i < particleCount; i++) {
            const dot = document.createElement('div');
            dot.classList.add('particle');

            // Random positioning and delay
            const size = Math.random() * 4 + 1; // 1px to 5px
            dot.style.width = `${size}px`;
            dot.style.height = `${size}px`;
            dot.style.left = `${Math.random() * 100}%`;
            dot.style.top = `${Math.random() * 100}%`;
            dot.style.animationDelay = `${Math.random() * 10}s`;
            dot.style.animationDuration = `${Math.random() * 10 + 10}s`;

            particlesContainer.appendChild(dot);
        }
    </script>
</body>

</html>
